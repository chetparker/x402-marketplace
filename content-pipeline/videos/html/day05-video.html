<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Day 05 — Revenue Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    background: #FFFFFF;
    font-family: Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 80px;
  }
  .header {
    font-size: 20px; color: #888; letter-spacing: 4px; margin-bottom: 60px;
    opacity: 0; animation: fadeIn 0.4s ease 0.2s forwards;
  }
  .title {
    font-family: Georgia, serif; font-size: 52px; font-weight: 700; color: #1A1A1A;
    margin-bottom: 50px;
    opacity: 0; animation: fadeIn 0.5s ease 0.4s forwards;
  }
  .row {
    display: flex; align-items: center; margin-bottom: 22px;
    opacity: 0; transform: translateX(40px);
  }
  .row:nth-child(1) { animation: slideIn 0.5s ease 1.0s forwards; }
  .row:nth-child(2) { animation: slideIn 0.5s ease 1.7s forwards; }
  .row:nth-child(3) { animation: slideIn 0.5s ease 2.4s forwards; }
  .row:nth-child(4) { animation: slideIn 0.5s ease 3.1s forwards; }
  .row:nth-child(5) { animation: slideIn 0.5s ease 3.8s forwards; }
  .row:nth-child(6) { animation: slideIn 0.5s ease 4.5s forwards; }
  .row:nth-child(7) { animation: slideIn 0.5s ease 5.2s forwards; }
  .row:nth-child(8) { animation: slideIn 0.5s ease 5.5s forwards; }
  .row:nth-child(9) { animation: slideIn 0.5s ease 5.8s forwards; }
  .row:nth-child(10) { animation: slideIn 0.5s ease 6.1s forwards; }
  .api-name { width: 320px; font-size: 22px; color: #1A1A1A; }
  .bar-container { flex: 1; height: 24px; margin: 0 20px; position: relative; }
  .bar {
    height: 100%; background: #C45426; border-radius: 3px;
    transform: scaleX(0); transform-origin: left;
    animation: growBar 0.5s ease forwards;
    animation-delay: inherit;
  }
  .revenue { width: 120px; text-align: right; font-size: 22px; font-weight: 600; color: #1A1A1A; }
  .total-section {
    margin-top: 50px; padding-top: 30px;
    border-top: 3px solid #1A1A1A;
    display: flex; justify-content: space-between; align-items: center;
    opacity: 0; animation: slideUp 0.6s ease 6.5s forwards;
  }
  .total-left { font-family: Georgia, serif; font-size: 64px; font-weight: 700; color: #1A1A1A; }
  .total-right { text-align: right; }
  .total-right .label { font-size: 20px; color: #888; }
  .total-right .value { font-family: Georgia, serif; font-size: 48px; font-weight: 700; color: #2D6B4A; }

  .rows-container { margin-top: 20px; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes growBar {
    to { transform: scaleX(1); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="header">WEEK 1 REVENUE</div>
  <div class="title">10 APIs earning while I sleep.</div>
  <div class="rows-container">
    <div class="row">
      <div class="api-name">Postcode Lookup</div>
      <div class="bar-container"><div class="bar" style="width: 100%;"></div></div>
      <div class="revenue">$114.00</div>
    </div>
    <div class="row">
      <div class="api-name">UK Company Data</div>
      <div class="bar-container"><div class="bar" style="width: 81%;"></div></div>
      <div class="revenue">$92.00</div>
    </div>
    <div class="row">
      <div class="api-name">Credit Score Check</div>
      <div class="bar-container"><div class="bar" style="width: 57%;"></div></div>
      <div class="revenue">$64.80</div>
    </div>
    <div class="row">
      <div class="api-name">Property Valuation</div>
      <div class="bar-container"><div class="bar" style="width: 50%;"></div></div>
      <div class="revenue">$57.00</div>
    </div>
    <div class="row">
      <div class="api-name">Email Verification</div>
      <div class="bar-container"><div class="bar" style="width: 30%;"></div></div>
      <div class="revenue">$34.00</div>
    </div>
    <div class="row">
      <div class="api-name">VAT Validation</div>
      <div class="bar-container"><div class="bar" style="width: 24%;"></div></div>
      <div class="revenue">$27.00</div>
    </div>
    <div class="row">
      <div class="api-name">Phone Validation</div>
      <div class="bar-container"><div class="bar" style="width: 21%;"></div></div>
      <div class="revenue">$24.50</div>
    </div>
    <div class="row">
      <div class="api-name">Domain WHOIS</div>
      <div class="bar-container"><div class="bar" style="width: 19%;"></div></div>
      <div class="revenue">$21.60</div>
    </div>
    <div class="row">
      <div class="api-name">IP Geolocation</div>
      <div class="bar-container"><div class="bar" style="width: 14%;"></div></div>
      <div class="revenue">$16.00</div>
    </div>
    <div class="row">
      <div class="api-name">FX Rates</div>
      <div class="bar-container"><div class="bar" style="width: 12%;"></div></div>
      <div class="revenue">$14.00</div>
    </div>
  </div>
  <div class="total-section">
    <div class="total-left">$465</div>
    <div class="total-right">
      <div class="label">hours worked</div>
      <div class="value">0</div>
    </div>
  </div>
</body>
</html>
