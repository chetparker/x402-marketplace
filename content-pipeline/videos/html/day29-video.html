<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Day 29 — Month 1 Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    background: #F7F5F0;
    font-family: Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 180px;
  }
  .header {
    font-size: 20px; color: #888; letter-spacing: 4px; margin-bottom: 60px;
    opacity: 0; animation: fadeIn 0.4s ease 0.2s forwards;
  }
  .big-number {
    font-family: Georgia, serif; font-size: 160px; font-weight: 700; color: #1A1A1A;
    opacity: 0; animation: countUp 2.5s ease 0.5s forwards;
  }
  .subtitle {
    font-size: 24px; color: #888; margin-top: 10px;
    opacity: 0; animation: fadeIn 0.3s ease 2.8s forwards;
  }
  .divider {
    width: 600px; height: 1px; background: #CCC; margin: 50px 0;
    opacity: 0; animation: fadeIn 0.3s ease 3s forwards;
  }

  .stats { display: flex; gap: 60px; margin-bottom: 10px; }
  .stat { text-align: center; opacity: 0; }
  .stat:nth-child(1) { animation: slideUp 0.4s ease 3.2s forwards; }
  .stat:nth-child(2) { animation: slideUp 0.4s ease 3.6s forwards; }
  .stat:nth-child(3) { animation: slideUp 0.4s ease 4.0s forwards; }
  .stat-value { font-family: Georgia, serif; font-size: 44px; font-weight: 700; color: #1A1A1A; }
  .stat-value.green { color: #2D6B4A; }
  .stat-label { font-size: 16px; color: #888; margin-top: 6px; }

  .weekly-section {
    margin-top: 50px; width: 700px;
    opacity: 0; animation: fadeIn 0.4s ease 5s forwards;
  }
  .weekly-title {
    font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 20px;
  }
  .week-row { display: flex; align-items: center; margin-bottom: 12px; }
  .week-label { width: 80px; font-size: 16px; color: #888; }
  .week-bar { height: 28px; background: #C45426; border-radius: 4px; margin-right: 15px; }
  .week-val { font-size: 18px; font-weight: 600; color: #1A1A1A; }

  .costs {
    margin-top: 50px; width: 700px;
    opacity: 0; animation: fadeIn 0.4s ease 7s forwards;
  }
  .costs-title {
    font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 20px;
  }
  .cost-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .cost-name { font-size: 20px; color: #1A1A1A; }
  .cost-val { font-size: 20px; font-weight: 700; color: #2D6B4A; }

  .profit {
    margin-top: 50px;
    font-family: Georgia, serif; font-size: 48px; font-weight: 700; color: #C45426;
    opacity: 0; animation: popIn 0.5s ease 9s forwards;
  }
  .profit-label { font-size: 20px; color: #888; margin-top: 5px; }

  .footer {
    margin-top: 40px; font-size: 18px; color: #AAA;
    opacity: 0; animation: fadeIn 0.3s ease 9.5s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes countUp {
    0% { opacity: 0; }
    20% { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.6); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="header">MONTH 1 REPORT</div>
  <div class="big-number">$2,200</div>
  <div class="subtitle">total revenue — month one</div>
  <div class="divider"></div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value">72,400</div>
      <div class="stat-label">requests</div>
    </div>
    <div class="stat">
      <div class="stat-value green">99.6%</div>
      <div class="stat-label">uptime</div>
    </div>
    <div class="stat">
      <div class="stat-value">0</div>
      <div class="stat-label">support tickets</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="weekly-section">
    <div class="weekly-title">WEEKLY GROWTH</div>
    <div class="week-row">
      <div class="week-label">Week 1</div>
      <div class="week-bar" style="width:270px; opacity:0.6;"></div>
      <div class="week-val">£465</div>
    </div>
    <div class="week-row">
      <div class="week-label">Week 2</div>
      <div class="week-bar" style="width:300px; opacity:0.7;"></div>
      <div class="week-val">£512</div>
    </div>
    <div class="week-row">
      <div class="week-label">Week 3</div>
      <div class="week-bar" style="width:330px; opacity:0.8;"></div>
      <div class="week-val">£560</div>
    </div>
    <div class="week-row">
      <div class="week-label">Week 4</div>
      <div class="week-bar" style="width:320px; opacity:0.75;"></div>
      <div class="week-val">£548</div>
    </div>
  </div>
  <div class="costs">
    <div class="costs-title">WHAT IT COST ME</div>
    <div class="cost-row"><div class="cost-name">Infrastructure</div><div class="cost-val">£0</div></div>
    <div class="cost-row"><div class="cost-name">Marketing</div><div class="cost-val">£0</div></div>
    <div class="cost-row"><div class="cost-name">Support</div><div class="cost-val">£0</div></div>
    <div class="cost-row"><div class="cost-name">Hours worked</div><div class="cost-val">~0</div></div>
  </div>
  <div class="profit">97% profit margin</div>
  <div class="profit-label">payapi.market</div>
</body>
</html>
