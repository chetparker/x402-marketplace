<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 510" width="680" height="510">
  <defs>
    <style>
      .headline { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="510" fill="#FFFFFF"/>

  <!-- Green top border -->
  <rect x="0" y="0" width="680" height="4" fill="#2D6B4A"/>

  <!-- Header -->
  <text x="40" y="50" class="body" font-size="11" fill="#888" letter-spacing="2.5">WEEK 2 RESULTS</text>
  <text x="640" y="50" class="body" font-size="10" fill="#AAA" text-anchor="end">payapi.market</text>
  <rect x="40" y="60" width="600" height="0.5" fill="#CCC"/>

  <!-- Big number -->
  <text x="340" y="170" class="headline" font-size="96" fill="#1A1A1A" text-anchor="middle" font-weight="700">£512</text>

  <!-- Growth pill -->
  <rect x="295" y="190" width="90" height="30" rx="15" fill="#E8F5E9"/>
  <text x="340" y="210" class="body" font-size="14" fill="#2D6B4A" text-anchor="middle" font-weight="700">+10% WoW</text>

  <!-- Divider -->
  <rect x="120" y="245" width="440" height="0.5" fill="#CCC"/>

  <!-- Three stats -->
  <text x="170" y="295" class="headline" font-size="28" fill="#1A1A1A" text-anchor="middle" font-weight="700">15,840</text>
  <text x="170" y="318" class="body" font-size="11" fill="#888" text-anchor="middle">requests</text>

  <rect x="280" y="270" width="0.5" height="55" fill="#CCC"/>

  <text x="340" y="295" class="headline" font-size="28" fill="#2D6B4A" text-anchor="middle" font-weight="700">99.6%</text>
  <text x="340" y="318" class="body" font-size="11" fill="#888" text-anchor="middle">uptime</text>

  <rect x="400" y="270" width="0.5" height="55" fill="#CCC"/>

  <text x="510" y="295" class="headline" font-size="28" fill="#1A1A1A" text-anchor="middle" font-weight="700">118ms</text>
  <text x="510" y="318" class="body" font-size="11" fill="#888" text-anchor="middle">avg latency</text>

  <!-- Divider -->
  <rect x="120" y="345" width="440" height="0.5" fill="#CCC"/>

  <!-- Week comparison -->
  <text x="340" y="385" class="body" font-size="14" fill="#666" text-anchor="middle">week 1: <tspan font-weight="600" fill="#1A1A1A">£465</tspan>  →  week 2: <tspan font-weight="600" fill="#2D6B4A">£512</tspan></text>

  <!-- Closing -->
  <text x="340" y="430" class="body" font-size="12" fill="#888" text-anchor="middle" font-style="italic">Passive income from APIs I built months ago.</text>

  <!-- Green bottom border -->
  <rect x="0" y="506" width="680" height="4" fill="#2D6B4A"/>

  <!-- Bottom text -->
  <rect x="40" y="470" width="600" height="0.5" fill="#CCC"/>
  <text x="340" y="495" class="body" font-size="10" fill="#AAA" text-anchor="middle">payapi.market · 10 APIs · x402 protocol</text>
</svg>