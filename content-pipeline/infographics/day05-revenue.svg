  <rect x="40" y="630" width="600" height="1.5" fill="#1A1A1A"/>

  <!-- Closing -->
  <text x="340" y="680" class="body" font-size="13" fill="#666" text-anchor="middle" font-style="italic">"Week one revenue from APIs I built months ago.</text>
  <text x="340" y="700" class="body" font-size="13" fill="#666" text-anchor="middle" font-style="italic">I didn't touch a single line of code."</text>

  <!-- Footer -->
  <rect x="40" y="750" width="600" height="50" rx="0" fill="#1A1A1A"/>
  <text x="340" y="781" class="body" font-size="14" fill="#F7F5F0" text-anchor="middle" font-weight="600">Start earning → payapi.market/list</text>

  <!-- Bottom rule -->
  <rect x="40" y="820" width="600" height="1" fill="#CCC"/>
</svg>