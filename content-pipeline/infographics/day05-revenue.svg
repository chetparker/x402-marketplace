  <!-- Row 7 -->
  <text x="40" y="455" class="body" font-size="12" fill="#1A1A1A">Phone Validation</text>
  <text x="340" y="455" class="body" font-size="12" fill="#888">4,900</text>
  <rect x="410" y="445" width="39" height="14" rx="2" fill="#C45426" opacity="0.3"/>
  <text x="580" y="456" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$24.50</text>

