<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 850" width="680" height="850">
  <defs>
    <style>
      .headline { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="850" fill="#FFFFFF"/>

  <!-- Top rule -->
  <rect x="40" y="30" width="600" height="3" fill="#1A1A1A"/>

  <!-- Header -->
  <text x="40" y="62" class="body" font-size="10" fill="#888" letter-spacing="2.5">WEEK 1 REVENUE</text>
  <text x="640" y="62" class="body" font-size="10" fill="#888" text-anchor="end">10 APIs · payapi.market</text>

  <!-- Thin rule -->
  <rect x="40" y="72" width="600" height="0.5" fill="#CCC"/>

  <!-- Big numbers -->
  <text x="40" y="130" class="headline" font-size="56" fill="#1A1A1A" font-weight="700">$465</text>
  <text x="245" y="130" class="headline" font-size="56" fill="#2D6B4A" font-weight="700">0</text>
  <text x="40" y="150" class="body" font-size="12" fill="#888">total revenue</text>
  <text x="245" y="150" class="body" font-size="12" fill="#888">hours worked</text>

  <!-- Divider -->
  <rect x="40" y="175" width="600" height="0.5" fill="#CCC"/>

  <!-- Table header -->
  <text x="40" y="205" class="body" font-size="10" fill="#888" font-weight="600">API</text>
  <text x="340" y="205" class="body" font-size="10" fill="#888" font-weight="600">REQUESTS</text>
  <text x="580" y="205" class="body" font-size="10" fill="#888" font-weight="600" text-anchor="end">REVENUE</text>
  <rect x="40" y="215" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 1 -->
  <text x="40" y="245" class="body" font-size="12" fill="#1A1A1A">Postcode &amp; Address Lookup</text>
  <text x="340" y="245" class="body" font-size="12" fill="#888">11,400</text>
  <rect x="410" y="235" width="144" height="14" rx="2" fill="#C45426" opacity="0.15"/>
  <rect x="410" y="235" width="144" height="14" rx="2" fill="#C45426" opacity="0.8"/>
  <text x="580" y="246" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$114.00</text>

  <!-- Row 2 -->
  <text x="40" y="280" class="body" font-size="12" fill="#1A1A1A">UK Company Data</text>
  <text x="340" y="280" class="body" font-size="12" fill="#888">9,200</text>
  <rect x="410" y="270" width="110" height="14" rx="2" fill="#C45426" opacity="0.65"/>
  <text x="580" y="281" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$92.00</text>

  <!-- Row 3 -->
  <text x="40" y="315" class="body" font-size="12" fill="#1A1A1A">Credit Score Check</text>
  <text x="340" y="315" class="body" font-size="12" fill="#888">8,100</text>
  <rect x="410" y="305" width="97" height="14" rx="2" fill="#C45426" opacity="0.55"/>
  <text x="580" y="316" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$64.80</text>

  <!-- Row 4 -->
  <text x="40" y="350" class="body" font-size="12" fill="#1A1A1A">Property Valuation</text>
  <text x="340" y="350" class="body" font-size="12" fill="#888">7,600</text>
  <rect x="410" y="340" width="85" height="14" rx="2" fill="#C45426" opacity="0.48"/>
  <text x="580" y="351" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$57.00</text>

  <!-- Row 5 -->
  <text x="40" y="385" class="body" font-size="12" fill="#1A1A1A">Email Verification</text>
  <text x="340" y="385" class="body" font-size="12" fill="#888">6,800</text>
  <rect x="410" y="375" width="54" height="14" rx="2" fill="#C45426" opacity="0.4"/>
  <text x="580" y="386" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$34.00</text>

  <!-- Row 6 -->
