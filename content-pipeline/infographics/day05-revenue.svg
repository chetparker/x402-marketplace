  <text x="40" y="490" class="body" font-size="12" fill="#1A1A1A">Domain WHOIS</text>
  <text x="340" y="490" class="body" font-size="12" fill="#888">3,600</text>
  <rect x="410" y="480" width="29" height="14" rx="2" fill="#C45426" opacity="0.25"/>
  <text x="580" y="491" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$21.60</text>

  <!-- Row 9 -->
  <text x="40" y="525" class="body" font-size="12" fill="#1A1A1A">IP Geolocation</text>
  <text x="340" y="525" class="body" font-size="12" fill="#888">3,200</text>
  <rect x="410" y="515" width="22" height="14" rx="2" fill="#C45426" opacity="0.2"/>
  <text x="580" y="526" class="body" font-size="12" fill="#1A1A1A" text-anchor="end" font-weight="600">$16.00</text>

  <!-- Row 10 -->
  <text x="40" y="560" class="body" font-size="12" fill="#1A1A1A">FX Rates</text>
