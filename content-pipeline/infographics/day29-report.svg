<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 850" width="680" height="850">
  <defs>
    <style>
      .headline { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="850" fill="#F7F5F0"/>

  <!-- Top rule -->
  <rect x="40" y="25" width="600" height="3" fill="#1A1A1A"/>

  <!-- Header -->
  <text x="40" y="55" class="body" font-size="11" fill="#888" letter-spacing="2.5">MONTH 1 REPORT</text>
  <text x="640" y="55" class="body" font-size="10" fill="#AAA" text-anchor="end">April 2026</text>
  <rect x="40" y="65" width="600" height="0.5" fill="#CCC"/>

  <!-- Big number -->
  <text x="340" y="150" class="headline" font-size="80" fill="#1A1A1A" text-anchor="middle" font-weight="700">$2,085</text>
  <text x="340" y="175" class="body" font-size="13" fill="#888" text-anchor="middle">total revenue — month one</text>

  <!-- Divider -->
  <rect x="40" y="200" width="600" height="0.5" fill="#CCC"/>

  <!-- THE NUMBERS -->
  <text x="40" y="230" class="body" font-size="10" fill="#888" letter-spacing="2.5">THE NUMBERS</text>

  <!-- Stats row -->
  <text x="120" y="278" class="headline" font-size="32" fill="#1A1A1A" text-anchor="middle" font-weight="700">72,400</text>
  <text x="120" y="300" class="body" font-size="10" fill="#888" text-anchor="middle">requests</text>

  <rect x="220" y="255" width="0.5" height="55" fill="#CCC"/>

  <text x="340" y="278" class="headline" font-size="32" fill="#2D6B4A" text-anchor="middle" font-weight="700">99.6%</text>
  <text x="340" y="300" class="body" font-size="10" fill="#888" text-anchor="middle">uptime</text>

  <rect x="440" y="255" width="0.5" height="55" fill="#CCC"/>

  <text x="560" y="278" class="headline" font-size="32" fill="#1A1A1A" text-anchor="middle" font-weight="700">0</text>
  <text x="560" y="300" class="body" font-size="10" fill="#888" text-anchor="middle">support tickets</text>

  <!-- Divider -->
  <rect x="40" y="325" width="600" height="0.5" fill="#CCC"/>

  <!-- WEEKLY GROWTH -->
  <text x="40" y="355" class="body" font-size="10" fill="#888" letter-spacing="2.5">WEEKLY GROWTH</text>

  <!-- Week bars -->
  <text x="40" y="390" class="body" font-size="11" fill="#888">Week 1</text>
  <rect x="110" y="378" width="186" height="16" rx="2" fill="#C45426" opacity="0.6"/>
  <text x="305" y="391" class="body" font-size="11" fill="#1A1A1A" font-weight="600">£465</text>

  <text x="40" y="418" class="body" font-size="11" fill="#888">Week 2</text>
  <rect x="110" y="406" width="205" height="16" rx="2" fill="#C45426" opacity="0.7"/>
  <text x="324" y="419" class="body" font-size="11" fill="#1A1A1A" font-weight="600">£512</text>

  <text x="40" y="446" class="body" font-size="11" fill="#888">Week 3</text>
  <rect x="110" y="434" width="224" height="16" rx="2" fill="#C45426" opacity="0.8"/>
  <text x="343" y="447" class="body" font-size="11" fill="#1A1A1A" font-weight="600">£560</text>

  <text x="40" y="474" class="body" font-size="11" fill="#888">Week 4</text>
  <rect x="110" y="462" width="219" height="16" rx="2" fill="#C45426" opacity="0.75"/>
  <text x="338" y="475" class="body" font-size="11" fill="#1A1A1A" font-weight="600">£548</text>

  <!-- Divider -->
  <rect x="40" y="500" width="600" height="0.5" fill="#CCC"/>

  <!-- WHAT IT COST ME -->
  <text x="40" y="530" class="body" font-size="10" fill="#888" letter-spacing="2.5">WHAT IT COST ME</text>

  <!-- Cost items -->
  <text x="40" y="560" class="body" font-size="13" fill="#1A1A1A">Infrastructure</text>
  <text x="300" y="560" class="body" font-size="13" fill="#2D6B4A" font-weight="700">£0</text>

  <text x="40" y="585" class="body" font-size="13" fill="#1A1A1A">Marketing</text>
  <text x="300" y="585" class="body" font-size="13" fill="#2D6B4A" font-weight="700">£0</text>

  <text x="40" y="610" class="body" font-size="13" fill="#1A1A1A">Support</text>
  <text x="300" y="610" class="body" font-size="13" fill="#2D6B4A" font-weight="700">£0</text>

  <text x="40" y="635" class="body" font-size="13" fill="#1A1A1A">Hours worked</text>
  <text x="300" y="635" class="body" font-size="13" fill="#2D6B4A" font-weight="700">~0</text>

  <!-- Divider -->
  <rect x="40" y="655" width="600" height="0.5" fill="#CCC"/>

  <!-- Profit margin -->
  <text x="40" y="690" class="body" font-size="13" fill="#1A1A1A">Profit margin:</text>
  <text x="160" y="690" class="headline" font-size="22" fill="#C45426" font-weight="700">97%</text>

  <!-- Projection -->
  <rect x="40" y="710" width="600" height="40" rx="4" fill="#F0F6F2" stroke="#2D6B4A" stroke-width="1"/>
  <text x="340" y="736" class="body" font-size="14" fill="#2D6B4A" text-anchor="middle" font-weight="600">At this trajectory: $25,020/year</text>

  <!-- CTA bar -->
  <rect x="40" y="775" width="600" height="45" fill="#1A1A1A"/>
  <text x="340" y="803" class="body" font-size="14" fill="#F7F5F0" text-anchor="middle" font-weight="600">List your APIs → payapi.market</text>

  <!-- Bottom rule -->
  <rect x="40" y="835" width="600" height="1" fill="#CCC"/>
</svg>