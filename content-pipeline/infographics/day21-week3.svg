<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 510" width="680" height="510">
  <defs>
    <style>
      .headline { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="510" fill="#F7F5F0"/>

  <!-- Green top border -->
  <rect x="0" y="0" width="680" height="4" fill="#2D6B4A"/>

  <!-- Header -->
  <text x="40" y="48" class="body" font-size="11" fill="#888" letter-spacing="2.5">WEEK 3 RESULTS</text>
  <text x="640" y="48" class="body" font-size="10" fill="#AAA" text-anchor="end">payapi.market</text>
  <rect x="40" y="58" width="600" height="0.5" fill="#CCC"/>

  <!-- Big number -->
  <text x="340" y="155" class="headline" font-size="96" fill="#1A1A1A" text-anchor="middle" font-weight="700">£560</text>

  <!-- Growth pill -->
  <rect x="295" y="175" width="90" height="30" rx="15" fill="#E8F5E9"/>
  <text x="340" y="195" class="body" font-size="14" fill="#2D6B4A" text-anchor="middle" font-weight="700">+9% WoW</text>

  <!-- Divider -->
  <rect x="100" y="225" width="480" height="0.5" fill="#CCC"/>

  <!-- Weekly progression -->
  <text x="155" y="270" class="headline" font-size="24" fill="#888" text-anchor="middle">£465</text>
  <text x="155" y="288" class="body" font-size="9" fill="#AAA" text-anchor="middle">week 1</text>

  <text x="260" y="275" class="body" font-size="16" fill="#CCC">→</text>

  <text x="340" y="270" class="headline" font-size="24" fill="#888" text-anchor="middle">£512</text>
  <text x="340" y="288" class="body" font-size="9" fill="#AAA" text-anchor="middle">week 2</text>

  <text x="430" y="275" class="body" font-size="16" fill="#CCC">→</text>

  <text x="525" y="270" class="headline" font-size="24" fill="#2D6B4A" text-anchor="middle" font-weight="700">£560</text>
  <text x="525" y="288" class="body" font-size="9" fill="#2D6B4A" text-anchor="middle">week 3</text>

  <!-- Divider -->
  <rect x="100" y="310" width="480" height="0.5" fill="#CCC"/>

  <!-- Summary stats -->
  <text x="340" y="350" class="headline" font-size="18" fill="#1A1A1A" text-anchor="middle" font-weight="700">3 weeks. £1,537 total. 0 hours worked.</text>

  <rect x="140" y="370" width="400" height="40" rx="4" fill="#FFF" stroke="#2D6B4A" stroke-width="1"/>
  <text x="340" y="396" class="body" font-size="14" fill="#2D6B4A" text-anchor="middle" font-weight="600">At this rate: £2,240/month · £26,880/year</text>

  <!-- Closing -->
  <text x="340" y="445" class="body" font-size="12" fill="#888" text-anchor="middle" font-style="italic">Revenue from APIs I haven't touched in weeks.</text>

  <!-- Bottom rule -->
  <rect x="40" y="475" width="600" height="0.5" fill="#CCC"/>
  <text x="340" y="498" class="body" font-size="10" fill="#AAA" text-anchor="middle">payapi.market · 10 APIs · x402 protocol</text>

  <!-- Green bottom border -->
  <rect x="0" y="506" width="680" height="4" fill="#2D6B4A"/>
</svg>