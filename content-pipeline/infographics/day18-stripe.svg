<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680">
  <defs>
    <style>
      .headline { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="680" fill="#FFFFFF"/>

  <!-- Top rule -->
  <rect x="40" y="25" width="600" height="3" fill="#1A1A1A"/>

  <!-- Header -->
  <text x="340" y="60" class="headline" font-size="20" fill="#1A1A1A" text-anchor="middle" font-weight="700">x402 vs Stripe for API payments</text>
  <rect x="40" y="72" width="600" height="0.5" fill="#CCC"/>

  <!-- Column headers -->
  <text x="40" y="100" class="body" font-size="10" fill="#AAA" letter-spacing="1" font-weight="600">FEATURE</text>

  <!-- Stripe label -->
  <rect x="310" y="85" width="110" height="22" rx="3" fill="#F0EEFA"/>
  <text x="365" y="101" class="body" font-size="10" fill="#635BFF" text-anchor="middle" font-weight="700">Stripe</text>

  <!-- x402 label -->
  <rect x="470" y="85" width="110" height="22" rx="3" fill="#E8F5E9"/>
  <text x="525" y="101" class="body" font-size="10" fill="#2D6B4A" text-anchor="middle" font-weight="700">x402</text>

  <rect x="40" y="115" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 1: Setup -->
  <text x="40" y="143" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Setup</text>
  <text x="365" y="143" class="body" font-size="12" fill="#888" text-anchor="middle">Days–weeks</text>
  <text x="525" y="143" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">10 minutes</text>
  <rect x="40" y="158" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 2: Fee on $0.01 -->
  <text x="40" y="183" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Fee on $0.01</text>
  <rect x="310" y="170" width="110" height="22" rx="2" fill="#FDF5F3"/>
  <text x="365" y="185" class="body" font-size="12" fill="#C45426" text-anchor="middle" font-weight="600">$0.33 (3,200%)</text>
  <text x="525" y="183" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">&lt;$0.0001</text>
  <rect x="40" y="198" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 3: Settlement -->
  <text x="40" y="223" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Settlement</text>
  <text x="365" y="223" class="body" font-size="12" fill="#888" text-anchor="middle">2–7 days</text>
  <text x="525" y="223" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">Instant</text>
  <rect x="40" y="238" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 4: Accounts needed -->
  <text x="40" y="263" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Accounts needed</text>
  <text x="365" y="263" class="body" font-size="12" fill="#888" text-anchor="middle">3+ (Stripe, bank, etc)</text>
  <text x="525" y="263" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">0</text>
  <rect x="40" y="278" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 5: API keys -->
  <text x="40" y="303" class="body" font-size="12" fill="#1A1A1A" font-weight="600">API keys</text>
  <text x="365" y="303" class="body" font-size="12" fill="#888" text-anchor="middle">Required</text>
  <text x="525" y="303" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">Not needed</text>
  <rect x="40" y="318" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 6: AI agents -->
  <text x="40" y="343" class="body" font-size="12" fill="#1A1A1A" font-weight="600">AI agents</text>
  <rect x="310" y="330" width="110" height="22" rx="2" fill="#FDF5F3"/>
  <text x="365" y="345" class="body" font-size="12" fill="#C45426" text-anchor="middle" font-weight="600">Can't use it</text>
  <rect x="470" y="330" width="110" height="22" rx="2" fill="#E8F5E9"/>
  <text x="525" y="345" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">Native support</text>
  <rect x="40" y="358" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 7: Min charge -->
  <text x="40" y="383" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Min charge</text>
  <text x="365" y="383" class="body" font-size="12" fill="#888" text-anchor="middle">$0.50</text>
  <text x="525" y="383" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">$0.0001</text>
  <rect x="40" y="398" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 8: Micropayments -->
  <text x="40" y="423" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Micropayments</text>
  <rect x="310" y="410" width="110" height="22" rx="2" fill="#FDF5F3"/>
  <text x="365" y="425" class="body" font-size="12" fill="#C45426" text-anchor="middle" font-weight="600">Impossible</text>
  <rect x="470" y="410" width="110" height="22" rx="2" fill="#E8F5E9"/>
  <text x="525" y="425" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">Built for it</text>
  <rect x="40" y="438" width="600" height="0.5" fill="#EEE"/>

  <!-- Row 9: Best for -->
  <text x="40" y="463" class="body" font-size="12" fill="#1A1A1A" font-weight="600">Best for</text>
  <text x="365" y="463" class="body" font-size="12" fill="#888" text-anchor="middle">Human checkout</text>
  <text x="525" y="463" class="body" font-size="12" fill="#2D6B4A" text-anchor="middle" font-weight="600">Agent payments</text>

  <!-- Bottom rule -->
  <rect x="40" y="485" width="600" height="1.5" fill="#1A1A1A"/>

  <!-- Closing -->
  <text x="340" y="530" class="headline" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="700">Stripe is great for humans.</text>
  <text x="340" y="555" class="headline" font-size="16" fill="#2D6B4A" text-anchor="middle" font-weight="700">x402 is great for agents.</text>

  <!-- Footnote -->
  <text x="340" y="595" class="body" font-size="11" fill="#888" text-anchor="middle" font-style="italic">Agents are the fastest-growing customer segment.</text>

  <!-- Bottom -->
  <rect x="40" y="640" width="600" height="0.5" fill="#CCC"/>
  <text x="340" y="665" class="body" font-size="10" fill="#AAA" text-anchor="middle">payapi.market</text>
</svg>